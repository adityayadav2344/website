<!DOCTYPE html>
<html>
<head>
    <title> Website</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        .box {
            margin-top: 50px;
            padding: 20px;
            background: white;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Hello 👋</h1>
        <p>website</p> 
        <button onclick="showMessage()">Click Me</button>
    </div>

    <script>
        function showMessage() {
            alert("You clicked the button!");
        }
    </script>

</body>
</html>
